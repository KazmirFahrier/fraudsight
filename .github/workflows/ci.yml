name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (test deps only — fast CI, no torch/tf)
        run: pip install pandas numpy scikit-learn pytest
      - name: Run leakage + metric tests
        run: pytest -q
